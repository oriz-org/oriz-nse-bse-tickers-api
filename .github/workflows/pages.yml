name: pages

on:
  push:
    branches: [main]
    paths:
      - 'data/**'
      - 'docs/**'
      - 'manifest.webmanifest'
      - 'CNAME'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Build site
        run: |
          mkdir -p _site
          cp -r data _site/
          cp -r docs/* _site/ 2>/dev/null || true
          cp manifest.webmanifest _site/ 2>/dev/null || true
          cp CNAME _site/ 2>/dev/null || true
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
